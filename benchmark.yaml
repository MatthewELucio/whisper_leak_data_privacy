# Example benchmark configuration

# Name for this benchmark run
benchmark_name: LLM_Leak_Detection_2023

# Sampling rate
sampling_rate: 0.05 # 5% of the data

# Chatbots to benchmark with their common names
chatbots:
  - Grok2
  - GPT4oMini
  - O1Mini
  - AzureGPT4oMini
  - AzureGPT4o
  - AzureGPTo1Mini
  - DeepseekV3OpenRouterLocked
  - ClaudeHaiku

# Model settings
model:
  class: LSTMBinaryClassifier
  params:
    hidden_size: 128
    num_layers: 2
    dropout_rate: 0.3
    embedding_dim: 32
    fc_dims: [128, 64]
    bidirectional: true
    attention_dim: 64

training:
  # Training parameters
  batch_size: 32
  max_epochs: 200
  learning_rate: 0.0001
  patience: 20
  test_size: 20
  valid_size: 5
  seed: 42
