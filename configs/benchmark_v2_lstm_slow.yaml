# Example benchmark configuration

# Benchmark config
benchmark_name: lstm_2_slow
sampling_rate: 1 # 100% of the data
num_trials: 5 # Number of trials to run for each model
data_path: data_v2

# Chatbots to benchmark with their common names
chatbots:
  - "*"

# Model settings
model:
  class: AttentionBiLSTMClassifier
  params:
    hidden_size: 128
    num_layers: 2
    dropout_rate: 0.3
    embedding_dim: 32
    fc_dims: [128, 64]
    bidirectional: true
    attention_dim: 64

training:
  # Training parameters
  batch_size: 32
  max_epochs: 200
  learning_rate: 0.0001
  patience: 20
  test_size: 20
  valid_size: 5
  seed: 42
