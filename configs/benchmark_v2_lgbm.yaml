# Example benchmark configuration

# Benchmark config
benchmark_name: lgbm_2
sampling_rate: 1 # 100% of the data
num_trials: 5 # Number of trials to run for each model
data_path: data_v2

# Chatbots to benchmark with their common names
chatbots:
  - "*"

# Model settings
model:
  class: LightGBMClassifier
  params:
    n_estimators: 1500
    learning_rate: 0.02

training:
  # Training parameters. Not applicable to LightGBMClassifier.
  batch_size: 32
  max_epochs: 200
  learning_rate: 0.0001
  patience: 20
  test_size: 20
  valid_size: 5
  seed: 42
