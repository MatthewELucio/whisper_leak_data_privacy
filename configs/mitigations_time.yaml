# Example benchmark configuration

# Benchmark config
benchmark_name: lgmb_time_mitigations
sampling_rate: 1
num_trials: 5 # Number of trials to run for each model
data_path: data/main
feature_modes:
#  - "Both"
#  - "Data Size Only"      # Test how mitigations affect different features
  - "Time Only"

# Chatbots to benchmark with their common names. >=0.8 AUPRC from time data.
chatbots:
#  - azuregpt41nano
#  - gpt41nano
  - claudehaiku
#  - geminiflash


# --- Mitigation Sets ---
# Define different combinations of mitigations to test
mitigations:
  none: [] # Baseline - no mitigation

  remove_empty_time_entries:
    - type: RemoveZeroTimeEntries
      params: {}

  # Sleep means
  injection_0p5mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.5, injection_stddev_multiplier: 2.0}

  injection_0p75mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.75, injection_stddev_multiplier: 2.0}

  injection_1mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.0, injection_stddev_multiplier: 2.0}

  injection_1p25mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.25, injection_stddev_multiplier: 2.0}

  injection_1p5mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.5, injection_stddev_multiplier: 2.0}

  injection_2mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.0, injection_stddev_multiplier: 2.0}

  injection_2p5mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.5, injection_stddev_multiplier: 2.0}

  injection_3mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.0, injection_stddev_multiplier: 2.0}

  injection_3p5mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.5, injection_stddev_multiplier: 2.0}

  injection_4mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 4.0, injection_stddev_multiplier: 2.0}

  injection_5mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 5, injection_stddev_multiplier: 2.0}
  
  injection_6mean_2std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 6.0, injection_stddev_multiplier: 2.0}

  # All the same again with 1.0 stddev
  injection_0p5mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.5, injection_stddev_multiplier: 1.0}

  injection_0p75mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.75, injection_stddev_multiplier: 1.0}

  injection_1mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.0, injection_stddev_multiplier: 1.0}

  injection_1p25mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.25, injection_stddev_multiplier: 1.0}

  injection_1p5mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.5, injection_stddev_multiplier: 1.0}

  injection_2mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.0, injection_stddev_multiplier: 1.0}

  injection_2p5mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.5, injection_stddev_multiplier: 1.0}

  injection_3mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.0, injection_stddev_multiplier: 1.0}

  injection_3p5mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.5, injection_stddev_multiplier: 1.0}

  injection_4mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 4.0, injection_stddev_multiplier: 1.0}

  injection_5mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 5, injection_stddev_multiplier: 1.0}

  injection_6mean_1std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 6.0, injection_stddev_multiplier: 1.0}
  
  # All the same again with 3.0 stdev
  injection_0p5mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.5, injection_stddev_multiplier: 3.0}

  injection_0p75mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.75, injection_stddev_multiplier: 3.0}

  injection_1mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.0, injection_stddev_multiplier: 3.0}

  injection_1p25mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.25, injection_stddev_multiplier: 3.0}

  injection_1p5mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.5, injection_stddev_multiplier: 3.0}

  injection_2mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.0, injection_stddev_multiplier: 3.0}

  injection_2p5mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.5, injection_stddev_multiplier: 3.0}

  injection_3mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.0, injection_stddev_multiplier: 3.0}

  injection_3p5mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.5, injection_stddev_multiplier: 3.0}

  injection_4mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 4.0, injection_stddev_multiplier: 3.0}

  injection_5mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 5, injection_stddev_multiplier: 3.0}

  injection_6mean_3std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 6.0, injection_stddev_multiplier: 3.0}

  # Add them all again with 0.5std
  injection_0p5mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.5, injection_stddev_multiplier: 0.5}

  injection_0p75mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.75, injection_stddev_multiplier: 0.5}

  injection_1mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.0, injection_stddev_multiplier: 0.5}

  injection_1p25mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.25, injection_stddev_multiplier: 0.5}

  injection_1p5mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.5, injection_stddev_multiplier: 0.5}

  injection_2mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.0, injection_stddev_multiplier: 0.5}

  injection_2p5mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.5, injection_stddev_multiplier: 0.5}

  injection_3mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.0, injection_stddev_multiplier: 0.5}

  injection_3p5mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.5, injection_stddev_multiplier: 0.5}

  injection_4mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 4.0, injection_stddev_multiplier: 0.5}

  injection_5mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 5, injection_stddev_multiplier: 0.5}

  injection_6mean_0p5std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 6.0, injection_stddev_multiplier: 0.5}
  
  # Add them all again for 0.25 stdev
  injection_0p5mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.5, injection_stddev_multiplier: 0.25}

  injection_0p75mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.75, injection_stddev_multiplier: 0.25}

  injection_1mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.0, injection_stddev_multiplier: 0.25}

  injection_1p25mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.25, injection_stddev_multiplier: 0.25}

  injection_1p5mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 1.5, injection_stddev_multiplier: 0.25}

  injection_2mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.0, injection_stddev_multiplier: 0.25}

  injection_2p5mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 2.5, injection_stddev_multiplier: 0.25}

  injection_3mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.0, injection_stddev_multiplier: 0.25}

  injection_3p5mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 3.5, injection_stddev_multiplier: 0.25}

  injection_4mean_0p25std:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 4.0, injection_stddev_multiplier: 0.25}

  injection_5mean_0p25std:
