# Example benchmark configuration

# Benchmark config
benchmark_name: lstm_temperature_sweep
sampling_rate: 1.0
num_trials: 5 # Number of trials to run for each model
data_path: [./data_temp/00, ./data_temp/10, ./data_temp/20, ./data_temp/30, ./data_temp/40, ./data_temp/50, ./data_temp/60, ./data_temp/70, ./data_temp/80, ./data_temp/90, ./data_temp/100]

# Chatbots to benchmark with their common names
chatbots:
  - AzureGPT4o

# Model settings
model:
  class: AttentionBiLSTMClassifier
  params:
    hidden_size: 128
    num_layers: 2
    dropout_rate: 0.3
    embedding_dim: 32
    fc_dims: [128, 64]
    bidirectional: true
    attention_dim: 64

training:
  # Training parameters
  batch_size: 32
  max_epochs: 100
  learning_rate: 0.0002
  patience: 20
  test_size: 20
  valid_size: 5
  seed: 42
