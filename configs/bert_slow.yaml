# Example benchmark configuration

# Benchmark config
benchmark_name: bert_2_slow
sampling_rate: 1 # 100% of the data
num_trials: 5 # Number of trials to run for each model
data_path: data/main

# Chatbots to benchmark with their common names
chatbots:
  - "*"

# Model settings
model:
  class: BERTTimeSeriesClassifier
  params:
    fc_dims: [128, 64]
    dropout_rate: 0.3
    model_name: 'distilbert-base-uncased'
    num_buckets: 50
    interleave: false

training:
  # Training parameters
  batch_size: 32
  max_epochs: 100
  learning_rate: 0.00001
  patience: 20
  test_size: 20
  valid_size: 5
  seed: 42
