# Example benchmark configuration

# Benchmark config
benchmark_name: large2_sweep
sampling_rate: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95, 1.0]
num_trials: 5 # Number of trials to run for each model
data_path: data/large2
feature_modes:
  - "Both"

# Chatbots to benchmark with their common names
chatbots:
  - AzureGPT4o

# Model settings
model:
  class: AttentionBiLSTMClassifier
  params:
    hidden_size: 128
    num_layers: 2
    dropout_rate: 0.3
    embedding_dim: 32
    fc_dims: [128, 64]
    bidirectional: true
    attention_dim: 64

training:
  # Training parameters
  batch_size: 32
  max_epochs: 100
  learning_rate: 0.0002
  patience: 20
  test_size: 20
  valid_size: 5
  seed: 42
