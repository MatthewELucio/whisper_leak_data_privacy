# Example benchmark configuration

# Benchmark config
benchmark_name: large2_sweep
sampling_rate: [1.0]
num_trials: 5 # Number of trials to run for each model
data_path: data/large2
feature_modes:
  - "Both"

# Chatbots to benchmark with their common names
chatbots:
  - AzureGPT4o

# Model settings
model:
  class: BERTTimeSeriesClassifier
  params:
    fc_dims: [128, 64]
    dropout_rate: 0.3
    model_name: 'distilbert-base-uncased'
    num_buckets: 50
    interleave: false

training:
  # Training parameters
  batch_size: 32
  max_epochs: 100
  learning_rate: 0.0002
  patience: 5
  test_size: 20
  valid_size: 5
  seed: 42
