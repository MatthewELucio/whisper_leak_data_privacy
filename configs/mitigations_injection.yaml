# Example benchmark configuration

# Benchmark config
benchmark_name: lgmb_injection
sampling_rate: 1
num_trials: 5 # Number of trials to run for each model
data_path: data/main
feature_modes:
  - "Both"
  - "Data Size Only"      # Test how mitigations affect different features
  - "Time Only"

# Chatbots to benchmark with their common names. >=0.8 AUPRC from time data.
chatbots:
  - azuregpt41nano
  - gpt41nano
  - claudehaiku
  - geminiflash
  - mistrallarge
  - azuredeepseekr1
  - gpt4omini
  - grok3

# --- Mitigation Sets ---
# Define different combinations of mitigations to test
mitigations:
  none: [] # Baseline - no mitigation

  remove_empty_time_entries:
    - type: RemoveZeroTimeEntries
      params: {}

  # ====================================================================
  # === Packet Injection - size_std_multiplier = 1.0 (Default)
  # ====================================================================

  # 2.0 injection stddev
  injection_0p5mean_2std_1stdsize:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.5, injection_stddev_multiplier: 2.0, size_std_multiplier: 1.0}

  injection_0p75mean_2std_1stdsize:
    - type: PacketInjectionMitigation
      params: {injections_per_mean: 0.75, injection_stddev_multiplier: 2.0, size_std_multiplier: 1.0}

  injection_1mean_2std_1stdsize:
    - type: PacketInjectionMitigation
